---
schemaVersion: 1
module: "alloy"
target: "observability"
services:
  alloy:
    image: "grafana/alloy@sha256:8f5666aebb871ba43ee2d65159c5d1c26c903720efafaf2d9ed4e237afc3bc88"
    containerName: "alloy"
    lifecycle: "daemon"
    updatePolicy: "pinned"
    placement: "rootful"
    dependencies:
      loki: "started"
    networks:
    - "monitoring"
    volumes:
    - "./configs/alloy/alloy.hcl:/etc/alloy/alloy.hcl:ro"
    - "/var/log/journal:/var/log/journal:ro"
    - "/run/log/journal:/run/log/journal:ro"
    - "/etc/machine-id:/etc/machine-id:ro"
    health:
      test:
      - "CMD"
      - "alloy"
      - "--version"
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "20s"
    command:
    - "run"
    - "/etc/alloy/alloy.hcl"
    restart: "unless-stopped"
networks: {}
volumes: {}
